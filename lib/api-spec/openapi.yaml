openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: pickups
    description: Pickup request lifecycle operations
  - name: jobs
    description: Collector job operations
  - name: receipts
    description: Receipt operations
  - name: collectors
    description: Collector profile and earnings operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pickups:
    post:
      operationId: createPickup
      tags: [pickups]
      summary: Create a pickup request (household)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePickupRequest"
      responses:
        "201":
          description: Pickup request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pickup"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pickups/mine:
    get:
      operationId: listMyPickups
      tags: [pickups]
      summary: List pickup history for current household user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pickups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pickup"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pickups/{id}:
    get:
      operationId: getPickupById
      tags: [pickups]
      summary: Get pickup details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pickup details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /jobs/nearby:
    get:
      operationId: listNearbyJobs
      tags: [jobs]
      summary: List nearby pending pickup requests for collectors
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radiusKm
          in: query
          required: true
          schema:
            type: number
            minimum: 0.1
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pickups/{id}/accept:
    post:
      operationId: acceptPickup
      tags: [jobs]
      summary: Accept a pickup request (collector)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pickup accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pickup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /pickups/{id}/weight:
    post:
      operationId: enterPickupWeight
      tags: [jobs]
      summary: Enter collected weight for a pickup (collector)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnterWeightRequest"
      responses:
        "200":
          description: Weight recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pickup"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /pickups/{id}/complete:
    post:
      operationId: completePickup
      tags: [jobs]
      summary: Complete a pickup and generate receipt (collector)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pickup completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PickupDetails"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /collectors/me/earnings:
    get:
      operationId: getMyEarnings
      tags: [collectors]
      summary: Get collector earnings summary
      security:
        - bearerAuth: []
      parameters:
        - name: range
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/EarningsRange"
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EarningsSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /receipts/{pickupId}:
    get:
      operationId: getReceiptByPickupId
      tags: [receipts]
      summary: Get receipt by pickup id
      security:
        - bearerAuth: []
      parameters:
        - name: pickupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Receipt"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          description: Optional structured details (e.g. validation issues)
      required:
        - error
        - message

    UserRole:
      type: string
      enum: [household, collector, admin]
    UserStatus:
      type: string
      enum: [active, pending_verification, suspended]
    PickupStatus:
      type: string
      enum: [pending, accepted, in_progress, completed, cancelled]
    EarningsRange:
      type: string
      enum: [daily, weekly]

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role: { $ref: "#/components/schemas/UserRole" }
        status: { $ref: "#/components/schemas/UserStatus" }
        createdAt: { type: string, format: date-time }
      required: [id, name, email, role, status, createdAt]

    RegisterRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        role:
          $ref: "#/components/schemas/UserRole"
      required: [name, email, password, role]

    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 1 }
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT bearer token
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    PickupLocation:
      type: object
      properties:
        lat: { type: number }
        lng: { type: number }
        addressLabel: { type: string, nullable: true }
        area: { type: string, nullable: true }
        city: { type: string, nullable: true }
      required: [lat, lng]

    CreatePickupRequest:
      type: object
      properties:
        wasteType: { type: string, minLength: 1 }
        estimatedWeightKg:
          type: number
          minimum: 0
          nullable: true
        location:
          $ref: "#/components/schemas/PickupLocation"
      required: [wasteType, location]

    Pickup:
      type: object
      properties:
        id: { type: integer }
        householdUserId: { type: integer }
        wasteType: { type: string }
        estimatedWeightKg: { type: number, nullable: true }
        status: { $ref: "#/components/schemas/PickupStatus" }
        createdAt: { type: string, format: date-time }
        acceptedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        assignedCollectorUserId: { type: integer, nullable: true }
      required: [id, householdUserId, wasteType, status, createdAt]

    Job:
      type: object
      properties:
        pickup:
          $ref: "#/components/schemas/Pickup"
        location:
          $ref: "#/components/schemas/PickupLocation"
        distanceKm:
          type: number
          nullable: true
      required: [pickup, location]

    EnterWeightRequest:
      type: object
      properties:
        finalWeightKg:
          type: number
          minimum: 0
      required: [finalWeightKg]

    Receipt:
      type: object
      properties:
        id: { type: integer }
        pickupRequestId: { type: integer }
        finalWeightKg: { type: number }
        pointsAwarded: { type: integer }
        issuedAt: { type: string, format: date-time }
      required: [id, pickupRequestId, finalWeightKg, pointsAwarded, issuedAt]

    PickupDetails:
      type: object
      properties:
        pickup:
          $ref: "#/components/schemas/Pickup"
        location:
          description: Location may be null after completion/cancellation due to privacy policy.
          allOf:
            - $ref: "#/components/schemas/PickupLocation"
          nullable: true
        receipt:
          allOf:
            - $ref: "#/components/schemas/Receipt"
          nullable: true
      required: [pickup]

    EarningsSummary:
      type: object
      properties:
        range: { $ref: "#/components/schemas/EarningsRange" }
        pointsTotal:
          type: integer
          description: Total points earned in the selected range
        pickupsCompleted:
          type: integer
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
      required: [range, pointsTotal, pickupsCompleted, from, to]

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

